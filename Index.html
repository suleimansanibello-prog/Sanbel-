<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bauchi State – Isah Aminu Barau</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1628 0%, #1a2f4e 50%, #0d2137 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-family: 'Georgia', serif;
    }
    .wrapper { width: 100%; max-width: 480px; }
    .card {
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, #1c4a8a 0%, #0f2d5c 60%, #0a1e3d 100%);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      position: relative;
    }
    .card-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(255,255,255,0.015) 30px, rgba(255,255,255,0.015) 60px);
    }
    .avatar {
      position: relative;
      z-index: 1;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border: 3px solid rgba(255,255,255,0.25);
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .card-header h1 {
      position: relative;
      z-index: 1;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .card-header .subtitle {
      position: relative;
      z-index: 1;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: Arial, sans-serif;
    }
    .badge {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      border: 0.5px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 5px 14px;
      margin-top: 1rem;
    }
    .badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
    }
    .badge span {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      font-family: Arial, sans-serif;
      letter-spacing: 1px;
    }
    .card-body { padding: 1.5rem 2rem; }
    .field { margin-bottom: 1.25rem; }
    .field-label {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: Arial, sans-serif;
      margin-bottom: 4px;
    }
    .field-value {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      font-family: Arial, sans-serif;
    }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
    .divider { border-top: 0.5px solid rgba(255,255,255,0.08); padding-top: 1.25rem; margin-bottom: 1.25rem; }
    .contact-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .icon-circle {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(37,99,235,0.2);
      border: 0.5px solid rgba(37,99,235,0.4);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .contact-text {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      font-family: Arial, sans-serif;
    }
    .social-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      text-decoration: none;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-family: Arial, sans-serif;
      transition: background 0.2s;
    }
    .social-btn:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

            WhatsApp

          <a href="#" class="social-btn">

    </div>
  </div>
</div>
</body>
</html>
